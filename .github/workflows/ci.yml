name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-swift:
    name: Build Swift App
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build with SPM
        working-directory: Mathy
        run: swift build

  check-python:
    name: Check Python Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pix2tex fastapi uvicorn python-multipart Pillow

      - name: Syntax check
        run: python -m py_compile server/mathy_server.py

      - name: Import check
        run: python -c "from pix2tex.cli import LatexOCR; from fastapi import FastAPI; from PIL import Image; import uvicorn; print('imports ok')"
