name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: ./scripts/build_dmg.sh "${{ steps.version.outputs.version }}"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Mathy.dmg
          generate_release_notes: true
