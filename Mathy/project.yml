name: Mathy
options:
  bundleIdPrefix: com.mathy
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: "1.10.0"
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.1.0"

targets:
  Mathy:
    type: application
    platform: macOS
    sources:
      - path: Mathy
        excludes:
          - Resources/katex/**
    resources:
      - path: Mathy/Resources/latex_preview.html
      - path: Mathy/Resources/katex
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Mathy/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mathy/Mathy.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.mathy.Mathy
        PRODUCT_NAME: Mathy
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: KeyboardShortcuts
      - package: LaunchAtLogin
    entitlements:
      path: Mathy/Mathy.entitlements
