<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="katex/katex.min.css">
    <script src="katex/katex.min.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
            font-size: 20px;
            background: transparent;
            min-height: 60px;
        }
        @media (prefers-color-scheme: dark) {
            body { color: #e0e0e0; }
        }
        #math {
            max-width: 100%;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div id="math"></div>
    <script>
        try {
            katex.render("{{LATEX}}", document.getElementById("math"), {
                throwOnError: false,
                displayMode: true
            });
        } catch (e) {
            document.getElementById("math").textContent = "{{LATEX}}";
        }
    </script>
</body>
</html>
