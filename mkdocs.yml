site_name: Mathy
site_description: macOS menu bar app for LaTeX OCR
site_url: https://mathy-ocr.readthedocs.io/en/latest/
repo_url: https://github.com/FaroutYLq/mathy
repo_name: FaroutYLq/mathy

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - swift
    - python
    - bash
    - json
    - applescript

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Components:
    - Onboarding & Python Setup: onboarding.md
    - Server Management: server.md
    - Screen Capture & OCR: capture-and-ocr.md
    - UI Components: ui.md
  - Development: development.md

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
  - admonition
  - toc:
      permalink: true
